version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:4.2.3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  mysql:
    image: mysql:8.4.8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: retail_db
      MYSQL_USER: retail
      MYSQL_PASSWORD: retailpass
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8.6.0-alpine
    container_name: redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - '3000:3000'
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://retail:retailpass@mysql:3306/retail_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./apps/api-gateway:/app
      - /app/node_modules
    command: yarn start:dev
    networks:
      - backend

  inventory-service:
    build:
      context: ./apps/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://retail:retailpass@mysql:3306/retail_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./apps/inventory-service:/app
      - /app/node_modules
    command: yarn start:dev
    networks:
      - backend

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://retail:retailpass@mysql:3306/retail_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./apps/notification-service:/app
      - /app/node_modules
    command: yarn start:dev
    networks:
      - backend

  order-service:
    build:
      context: ./apps/order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://retail:retailpass@mysql:3306/retail_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./apps/order-service:/app
      - /app/node_modules
    command: yarn start:dev
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql-data:
